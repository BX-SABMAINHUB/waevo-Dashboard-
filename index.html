<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waevo Dashboard — Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root { --accent:#00e5ff; --secondary:#bd00ff; --danger:#ff0055; --success:#00ff88; --warning:#ffaa00; --muted:#94a3b8; --border:rgba(255,255,255,0.08); --card:rgba(15,15,22,0.95); }
    * { box-sizing:border-box; margin:0; padding:0; outline:none; }
    body { background:linear-gradient(-45deg,#050505,#0a0a14,#0d0520,#050a14); background-size:400% 400%; animation:gradBG 12s ease infinite; color:#f8fafc; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    @keyframes gradBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .bg-grid { position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none; }
    .wrap { position:relative;z-index:1;width:460px;max-width:94vw;animation:slideUp 0.5s cubic-bezier(0.2,0.8,0.2,1); }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .logo { text-align:center;margin-bottom:10px;font-size:3.2rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#00e5ff,#bd00ff,#ff0055);-webkit-background-clip:text;color:transparent;filter:drop-shadow(0 0 20px rgba(189,0,255,0.5)); }
    .subtitle { text-align:center;font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:36px; }
    .card { background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px;box-shadow:0 30px 80px rgba(0,0,0,0.8);backdrop-filter:blur(20px); }
    .card-title { font-size:18px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px; }
    .card-desc { font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6; }
    .info-box { background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);border-radius:12px;padding:14px 16px;font-size:12px;color:var(--muted);display:flex;gap:10px;margin-bottom:24px;line-height:1.6; }
    .info-box i { color:var(--accent);flex-shrink:0;margin-top:2px; }
    .label { font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:8px;display:block; }
    .input { width:100%;height:52px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:0 18px;color:#f8fafc;font-size:14px;font-family:monospace;transition:0.3s;user-select:text;-webkit-user-select:text; }
    .input::placeholder { color:rgba(255,255,255,0.2);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px; }
    .input:focus { border-color:var(--accent);background:rgba(0,229,255,0.04);box-shadow:0 0 0 3px rgba(0,229,255,0.1);outline:none; }
    .input.ok  { border-color:var(--success);background:rgba(0,255,136,0.03); }
    .input.bad { border-color:var(--danger);background:rgba(255,0,85,0.03); }
    .error { font-size:12px;color:var(--danger);min-height:20px;margin:8px 0;font-weight:600; }
    .btn { width:100%;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--secondary),var(--accent));border:none;color:white;font-weight:700;font-size:15px;cursor:pointer;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px; }
    .btn:hover { opacity:0.88;transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,229,255,0.3); }
    .btn:disabled { opacity:0.4;cursor:not-allowed;transform:none; }
    .state { display:none; }
    .state.show { display:block;animation:fadeIn 0.3s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .wait-center { text-align:center;padding:10px 0; }
    .wait-ring { width:72px;height:72px;border-radius:50%;border:3px solid rgba(0,229,255,0.15);border-top-color:var(--accent);animation:spin 1s linear infinite;margin:0 auto 20px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .wait-num { font-size:3rem;font-weight:900;color:var(--accent);font-family:monospace;text-shadow:0 0 20px rgba(0,229,255,0.4);transition:color 0.3s; }
    .success-center { text-align:center;padding:10px 0; }
    .success-icon { font-size:64px;margin-bottom:16px;animation:popIn 0.5s cubic-bezier(0.2,0.8,0.2,1); }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .dots { display:flex;justify-content:center;gap:8px;margin-top:28px; }
    .dot { width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:0.3s; }
    .dot.on   { background:var(--accent);box-shadow:0 0 8px rgba(0,229,255,0.4); }
    .dot.done { background:var(--success); }
    @keyframes spinBtn { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="wrap">
    <div class="logo">Waevo</div>
    <div class="subtitle">Dashboard & Ajustes</div>
    <div class="card">

      <div id="s-input" class="state show">
        <div class="card-title">
          <i class="fas fa-key" style="color:var(--accent)"></i>
          Código de acceso
        </div>
        <div class="card-desc">Introduce el código de acceso para entrar al Dashboard de Waevo.</div>
        <div class="info-box">
          <i class="fas fa-circle-info"></i>
          <span>Abre Waevo y verás una notificación con tu clave. Cópiala y pégala aquí.</span>
        </div>
        <label class="label">Clave de acceso</label>
        <input type="text" class="input" id="code-input" placeholder="Pega aquí tu clave..." autocomplete="off" spellcheck="false">
        <div class="error" id="err"></div>
        <button class="btn" id="go-btn" onclick="doLogin()">
          <i class="fas fa-arrow-right"></i> Acceder al Dashboard
        </button>
      </div>

      <div id="s-wait" class="state">
        <div class="wait-center">
          <div class="wait-ring"></div>
          <div style="font-size:18px;font-weight:800;margin-bottom:8px">Verificando</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:20px">Por favor espera...</div>
          <div class="wait-num" id="wait-num">5</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">segundos</div>
        </div>
      </div>

      <div id="s-ok" class="state">
        <div class="success-center">
          <div class="success-icon">✅</div>
          <div style="font-size:22px;font-weight:900;margin-bottom:8px">¡Acceso concedido!</div>
          <div style="font-size:13px;color:var(--muted)">Entrando al Dashboard...</div>
        </div>
      </div>

    </div>
    <div class="dots">
      <div class="dot on" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>

  <script>
    const MASTER_CODE = 'jnjdnjj\u20AC)didm\u20ACnekjkjckjdkmkzmckldleo';

    function show(id) {
      ['s-input','s-wait','s-ok'].forEach(function(s) {
        document.getElementById(s).classList.remove('show');
      });
      document.getElementById(id).classList.add('show');
    }

    function doLogin() {
      const input = document.getElementById('code-input').value.trim();
      const err   = document.getElementById('err');
      const btn   = document.getElementById('go-btn');
      err.textContent = '';

      if (!input) { err.textContent = '❌ Introduce la clave.'; return; }

      if (input !== MASTER_CODE) {
        err.textContent = '❌ Clave incorrecta.';
        document.getElementById('code-input').classList.add('bad');
        document.getElementById('code-input').classList.remove('ok');
        return;
      }

      document.getElementById('code-input').classList.add('ok');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-circle-notch" style="animation:spinBtn 1s linear infinite;display:inline-block"></i> Verificando...';

      show('s-wait');
      document.getElementById('d1').classList.remove('on');
      document.getElementById('d1').classList.add('done');
      document.getElementById('d2').classList.add('on');

      let secs = 5;
      const numEl = document.getElementById('wait-num');
      const interval = setInterval(function() {
        secs--;
        numEl.textContent = secs;
        if (secs <= 0) {
          clearInterval(interval);
          sessionStorage.setItem('waevo_session', 'sess_' + Date.now());
          sessionStorage.setItem('waevo_user_id', 'master');
          show('s-ok');
          document.getElementById('d2').classList.remove('on');
          document.getElementById('d2').classList.add('done');
          document.getElementById('d3').classList.add('on');
          setTimeout(function() { window.location.href = 'dashboard.html'; }, 1500);
        }
      }, 1000);
    }

    document.getElementById('code-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
